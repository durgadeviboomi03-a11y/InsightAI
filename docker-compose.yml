
version: "3.9"

services:
  # ---------- MySQL Database ----------
  db:
    image: mysql:8.0
    container_name: insightai_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-insightai}
      MYSQL_USER: ${MYSQL_USER:-insightai_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-insightai_pass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - insightai_network

  # ---------- FastAPI Backend ----------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insightai_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-insightai_user}:${MYSQL_PASSWORD:-insightai_pass}@db:3306/${MYSQL_DATABASE:-insightai}
      SECRET_KEY: ${SECRET_KEY:-changeme-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./models:/app/models
      - ./charts:/app/charts
    networks:
      - insightai_network
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  db_data:

networks:
  insightai_network:
    driver: bridge